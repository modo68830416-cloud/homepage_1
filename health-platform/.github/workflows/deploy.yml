name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: health-platform
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: health-platform/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}

      # Replace this step with your platform's deploy action
      # (e.g. amondnet/vercel-action, or `vercel deploy --prod` via the CLI).
      # Deployment credentials/target are intentionally not filled in here —
      # see docs/deployment/runbook.md.
      - name: Deploy (placeholder)
        run: |
          echo "Wire up the actual deploy step for your hosting target here."
          echo "See docs/deployment/runbook.md for the pre/post-deploy checklist."
