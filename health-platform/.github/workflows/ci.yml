name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: health-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: health-platform/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (includes type check)
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://ci-preview.example.test

      - name: Start server for accessibility check
        run: npm run start & npx wait-on http://localhost:3000

      - name: Accessibility check (pa11y-ci)
        run: npx pa11y-ci --config .pa11yci.json

      - name: Stop server (lighthouse starts its own)
        run: pkill -f "next start" || true

      - name: Lighthouse CI
        run: npx @lhci/cli autorun --config=lighthouserc.json
